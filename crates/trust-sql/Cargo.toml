[package]
name = "openstack-keystone-trust-sql"
description = "OpenStack Keystone SQL driver for the trust provider"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
exclude.workspace = true

[dependencies]
async-trait.workspace = true
chrono.workspace = true
openstack-keystone-core = { version = "0.1", path = "../core" }
sea-orm.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["macros"] }
tracing.workspace = true

[dev-dependencies]
chrono.workspace = true
openstack-keystone-core = { version = "0.1", path = "../core", features = ["mock"] }
sea-orm = { workspace = true, features = ["mock", "sqlx-sqlite" ]}
serde_json.workspace = true
tokio = { workspace = true, features = ["macros"] }

[lints]
workspace = true
