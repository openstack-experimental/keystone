[package]
name = "openstack-keystone-storage-crypto"
description = "Cryptographic primitives for Keystone distributed storage (AES-256-GCM, HKDF, KEK/DEK hierarchy)."
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
exclude.workspace = true

[lints]
workspace = true

[dependencies]
aes-gcm.workspace = true
hkdf.workspace = true
# sha2 pinned to 0.10 to match hkdf 0.12's digest 0.10 trait boundary.
# The workspace uses sha2 0.11 (digest 0.11), which is incompatible with
# hkdf 0.12's type parameters. Both versions coexist in the dependency graph.
sha2 = "0.10"
rand.workspace = true
thiserror.workspace = true
tracing.workspace = true
zeroize = { version = "1", features = ["derive", "zeroize_derive"] }
