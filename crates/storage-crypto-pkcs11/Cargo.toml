[package]
name = "openstack-keystone-storage-crypto-pkcs11"
description = "PKCS#11 (Cryptoki) HSM-backed KEK provider for Keystone distributed storage (ADR 0016-v2 §2.5.1)."
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
exclude.workspace = true

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
enum_glob_use = "deny"
expect_used = "deny"
print_stdout = "deny"
unwrap_used = "deny"
doc_paragraphs_missing_punctuation = "warn"

[dependencies]
cryptoki = "0.12"
openstack-keystone-storage-crypto.workspace = true
rand.workspace = true
tracing.workspace = true
zeroize = "1"

[dev-dependencies]
tempfile.workspace = true
temp-env.workspace = true
