[package]
name = "openstack-keystone-distributed-storage"
description = "Keystone distributed storage based on the `openraft` and `fjall` database."
version = "0.1.1"
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
exclude.workspace = true

[lints]
workspace = true

[[bench]]
name = "write"
harness = false

[[bench]]
name = "encryption"
harness = false

[[bench]]
name = "state_machine"
harness = false

[dependencies]
async-trait.workspace = true
byteorder.workspace = true
dashmap.workspace = true
eyre.workspace = true
fjall = { version = "3.1" }
futures.workspace = true
http.workspace = true
mockall.workspace = true
openraft = { workspace = true, features = ["serde", "type-alias"] }
openstack-keystone-config = { version = "0.1", path = "../config/" }
prost.workspace = true
rand.workspace = true
rmp.workspace = true
rmp-serde = "1.3"
serde = { workspace = true, features = ["derive"] }
serde_bytes.workspace = true
serde_json.workspace = true
tempfile = { workspace = true, optional = true }
thiserror.workspace = true
tonic = { workspace = true, features = ["router", "_tls-any"] }
tonic-prost.workspace = true
tracing.workspace = true
tokio.workspace = true
chrono.workspace = true

[dev-dependencies]
criterion = { workspace = true, features = ["async_tokio"] }
rcgen.workspace = true
reserve-port = "2.4.0"
rustls.workspace = true
tempfile.workspace = true
tracing-subscriber.workspace = true
tonic = { workspace = true, features = ["tls-aws-lc"] }
tracing-test.workspace = true

[package.metadata.docs.rs]
all-features = true

[build-dependencies]
tonic-prost-build.workspace = true

[features]
default = []
bench_internals = []
mock = ["dep:tempfile"]
