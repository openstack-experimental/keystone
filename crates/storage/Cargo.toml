[package]
name = "openstack-keystone-distributed-storage"
description = "Keystone distributed storage based on the `openraft` and `fjall` database."
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
exclude.workspace = true

# This crate intentionally does NOT inherit workspace lints so that it can set
# `unsafe_code = "deny"` (rather than "forbid") for test code that re-sets the
# `KEYSTONE_DEV_KEK` environment variable between sequential node initializations.
# The `storage-crypto` crate uses the same override for mlock primitives. All
# other workspace crates use `unsafe_code = "forbid"` via the workspace default.
[lints.rust]
unsafe_code = "deny"

[lints.clippy]
enum_glob_use = "deny"
expect_used = "deny"
print_stdout = "deny"
unwrap_used = "deny"
doc_paragraphs_missing_punctuation = "warn"

[[bench]]
name = "write"
harness = false

[[bench]]
name = "encryption"
harness = false

[[bench]]
name = "state_machine"
harness = false

[dependencies]
async-trait.workspace = true
byteorder.workspace = true
dashmap.workspace = true
eyre.workspace = true
governor.workspace = true
fjall = { version = "3.1" }
futures.workspace = true
http.workspace = true
hyper-util = { workspace = true, features = ["tokio"] }
mockall.workspace = true
nix = { workspace = true, features = ["process", "resource"] }
openraft = { workspace = true, features = ["serde", "type-alias"] }
openstack-keystone-config.workspace = true
openstack-keystone-storage-api.workspace = true
openstack-keystone-storage-crypto.workspace = true
prost.workspace = true
rand.workspace = true
rmp.workspace = true
rmp-serde = "1.3"
rustls.workspace = true
secrecy = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_bytes.workspace = true
serde_json.workspace = true
spiffe = { workspace = true, features = ["x509-source"] }
spiffe-rustls.workspace = true
thiserror.workspace = true
tokio-rustls.workspace = true
tonic = { workspace = true, features = ["router", "_tls-any"] }
tonic-prost.workspace = true
tower.workspace = true
tracing.workspace = true
tokio.workspace = true
chrono.workspace = true
uuid.workspace = true
x509-parser.workspace = true

[dev-dependencies]
criterion = { workspace = true, features = ["async_tokio"] }
rcgen.workspace = true
reserve-port = "2.5.0"
rustls.workspace = true
serial_test.workspace = true
temp-env.workspace = true
tempfile.workspace = true
tracing-subscriber.workspace = true
tonic = { workspace = true, features = ["tls-aws-lc"] }
tracing-test.workspace = true

[package.metadata.docs.rs]
all-features = true

[build-dependencies]
tonic-prost-build.workspace = true

[features]
default = []
bench_internals = []
mock = []
