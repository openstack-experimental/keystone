syntax = "proto3";

package keystone.raft;

import "google/protobuf/empty.proto";
import "storage_types.proto";


// Node represents a single node in the Raft cluster.
message Node {
  // Unique identifier for the node.
  uint64 node_id = 1;
  // RPC address for node communication.
  string rpc_addr = 2;
}

// LeaderId represents the leader identifier in Raft.
message LeaderId {
  uint64 term = 1;
  uint64 node_id = 2;
}

// Vote represents the voting information in Raft leader election.
message Vote {
  LeaderId leader_id = 1;
  bool committed = 2;
}

message Entry {
  uint64 term = 1;
  uint64 index = 2;

  // Optional Membership config.
  Membership membership = 3;

  // Optional Store request.
  optional bytes app_data = 4;
}

// NodeIds is a set of NodeIds.
message NodeIdSet {
  map<uint64, google.protobuf.Empty> node_ids = 1;
}

// Membership config.
message Membership {
  // Joint(includes more than one NodeIdSet) or uniform(one NodeIdSet) config.
  repeated NodeIdSet configs = 1;

  // All of the nodes in the cluster, including voters and learners.
  // A node id that is included in `configs` is a voter, otherwise it is a learner.
  map<uint64, Node> nodes = 2;
}

// LogId represents the log identifier in Raft.
message LogId {
  uint64 term = 1;
  uint64 index = 2;
}

// VoteRequest represents a request for votes during leader election.
message VoteRequest {
  Vote vote = 1;
  LogId last_log_id = 2;
}

// VoteResponse represents the response to a vote request.
message VoteResponse {
  Vote vote = 1;
  bool vote_granted = 2;
  LogId last_log_id = 3;
}

message AppendEntriesRequest {
  // The leader's vote, used to identify the leader, and must be committed.
  Vote vote = 1;

  // The previous log id the leader has sent to the follower.
  LogId prev_log_id = 2;

  // The entries to be appended to the follower's log.
  repeated Entry entries = 3;

  // The leader's last committed log id.
  LogId leader_commit = 4;
}

message AppendEntriesResponse {
  // If not None, the follower rejected the AppendEntries request due to having a higher vote.
  // All other fields are valid only when this field is `None`.
  Vote rejected_by = 1;

  // The follower accepts this AppendEntries request's vote, but the prev_log_id conflicts with
  // the follower's log. The leader should retry with a smaller prev_log_id that matches the
  // follower's log.
  //
  // For unary AppendEntries, `last_log_id` is not used for conflicts.
  // For StreamAppend (pipeline replication), `last_log_id` carries the conflict log id.
  bool conflict = 2;

  // If `conflict = false`, the last log id the follower accepted from this request:
  // - None: all input entries were accepted and persisted.
  // - Some: partial success; only entries up to and including this id were accepted.
  //
  // If `conflict = true` in StreamAppend, this is the conflict log id.
  LogId last_log_id = 3;
}

// The first chunk of snapshot transmission, which contains the snapshot meta.
message SnapshotRequestMeta {
  Vote vote = 1;

  LogId last_log_id = 2;

  LogId last_membership_log_id = 3;

  Membership last_membership = 4;

  string snapshot_id = 5;
}

// The item of snapshot chunk stream.
//
// The first item contains `meta`, including the leader vote and snapshot-meta.
//
// Since the second item, the chunk contains the snapshot data.
message SnapshotRequest {
  oneof payload {
    SnapshotRequestMeta meta = 1;
    bytes chunk = 2;
  }
}

message SnapshotResponse {
  Vote vote = 1;
}

// All the data in a state machine, including user defined data and membership data.
message StateMachineData {
  // The last log id that has been applied to the state machine.
  LogId last_applied = 1;

  // User data in a map.
  map<string, string> data = 2;

  // The id of the last membership config log entry that is applied.
  LogId last_membership_log_id = 3;

  // The last membership config that is applied.
  Membership last_membership = 4;
}

// InternalService handles internal Raft cluster communication.
service RaftService {
  // Vote handles vote requests between Raft nodes during leader election.
  rpc Vote(VoteRequest) returns (VoteResponse) {}

  // AppendEntries handles call related to append entries RPC.
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse) {}

  // StreamAppend handles streaming append entries for pipeline replication.
  rpc StreamAppend(stream AppendEntriesRequest) returns (stream AppendEntriesResponse) {}

  // Snapshot handles install snapshot RPC.
  rpc Snapshot(stream SnapshotRequest) returns (SnapshotResponse) {}
}

// InitRequest contains the initial set of nodes for cluster initialization.
message InitRequest {
  // List of initial cluster nodes.
  repeated keystone.raft.Node nodes = 1;
}

// AddLearnerRequest specifies parameters for adding a learner node.
message AddLearnerRequest {
  // Node to be added as a learner
  keystone.raft.Node node = 1;
}

// ChangeMembershipRequest specifies parameters for modifying cluster
// membership.
message ChangeMembershipRequest {
  // New set of voter node IDs.
  repeated uint64 members = 1;
  // Whether to retain existing configuration.
  bool retain = 2;
}

message AdminResponse {
  // The log id of the committed log entry.
  keystone.raft.LogId log_id = 1;

  // If the committed log entry is a change-membership entry.
  keystone.raft.Membership membership = 2;

  // If the committed log entry is a normal one.
  keystone.api.Response data = 3;

  // Non-empty when the response is a pending emergency DEK rotation (stage 1
  // of dual-control). The caller must pass this id to ConfirmRotateDek within
  // 5 minutes.
  string pending_rotation_id = 4;
}

message MetricsResponse {
  // Cluster membership config.
  Membership membership = 1;

  // Leader information.
  optional uint64 current_leader = 2;

  // Remaining metrics as a string.
  string other_metrics = 3;
}


// ClusterAdminService provides the administrative interface for the cluster
// management.
service ClusterAdminService {
  // Init initializes a new Raft cluster with the given nodes.
  rpc Init(InitRequest) returns (google.protobuf.Empty) {}

  // AddLearner adds a new learner node to the Raft cluster.
  rpc AddLearner(AddLearnerRequest) returns (AdminResponse) {}

  // ChangeMembership modifies the cluster membership configuration.
  rpc ChangeMembership(ChangeMembershipRequest) returns (AdminResponse) {}

  // Metrics retrieves cluster metrics and status information.
  rpc Metrics(google.protobuf.Empty) returns (MetricsResponse) {}

  // ClearQuarantine clears the read-only quarantine state triggered by
  // repeated GCM tag verification failures. Requires operator access over
  // the internal management network.
  rpc ClearQuarantine(ClearQuarantineRequest) returns (google.protobuf.Empty) {}

  // RotateDek triggers a Data Encryption Key rotation. When emergency is
  // set, the current DEK is immediately revoked (not retired). Operator
  // access over the internal management network is required.
  rpc RotateDek(RotateDekRequest) returns (AdminResponse) {}

  // ConfirmRotateDek provides dual-control approval for an pending emergency
  // DEK rotation. Must be invoked within 5 minutes of the initial
  // RotateDekRequest{emergency: true} by a second storage-operator.
  rpc ConfirmRotateDek(ConfirmRotateDekRequest) returns (AdminResponse) {}

  // RotateDekLocalEmergency stages a node-local, quorum-bypass DEK rotation
  // candidate (ADR 0028 §3, amending ADR 0016-v2 §6.2): written only to this
  // node's local Fjall `local_emergency` keyspace, entirely bypassing Raft.
  // Refused unless this node's `[local_emergency]` guardrail currently
  // permits it (bypass enabled, quorum unreachable, leaderless grace period
  // elapsed). Reconciliation once quorum returns is a separate operation
  // (ADR 0028 §4, not yet implemented).
  rpc RotateDekLocalEmergency(RotateDekLocalEmergencyRequest) returns (RotateDekLocalEmergencyResponse) {}

  // ListDekLocalEmergencyCandidates lists node-local DEK emergency rotation
  // candidates on the responding node (ADR 0028 §6), so an operator can see
  // any LOCAL_EMERGENCY_CONFLICT before choosing which rotation_id to
  // reconcile.
  rpc ListDekLocalEmergencyCandidates(google.protobuf.Empty) returns (ListDekLocalEmergencyCandidatesResponse) {}

  // ReconcileDekLocalEmergency promotes a node-local DEK emergency rotation
  // candidate into Raft-replicated state once quorum has returned (ADR 0028
  // §6). Must be called against the specific node holding rotation_id --
  // reconciliation does not fan out across the cluster.
  rpc ReconcileDekLocalEmergency(ReconcileDekLocalEmergencyRequest) returns (AdminResponse) {}

  // GossipLocalEmergencyCandidate is a best-effort, peer-to-peer push of a
  // node-local emergency candidate (ADR 0028 §5). Called by the node that
  // originated the candidate against each reachable peer from the Raft
  // membership list, independent of Raft/quorum. The receiving node adopts
  // the candidate if it has none active for the same subsystem/scope, marks
  // both as conflicted if it already holds a different active candidate for
  // that scope, or no-ops if it already has this exact candidate.
  rpc GossipLocalEmergencyCandidate(GossipLocalEmergencyCandidateRequest) returns (GossipLocalEmergencyCandidateResponse) {}

  // Backup builds a fresh Fjall snapshot, encrypts it with the Backup DEK, and
  // streams the encrypted bytes to the operator. The final chunk carries the
  // snapshot_utc_epoch and dek_version from the backup envelope header for
  // client-side verification. Requires operator access over the internal
  // management network.
  rpc Backup(BackupRequest) returns (stream BackupChunk) {}

  // Restore accepts a client-streamed encrypted snapshot (produced by Backup),
  // validates the backup envelope, decrypts it, and installs it into the Raft
  // state machine. Only invoke against a freshly-bootstrapped single-node
  // cluster before adding learners (see ADR 0016-v2 §7).
  rpc Restore(stream RestoreChunk) returns (AdminResponse) {}
}

message ClearQuarantineRequest {
  // The keyspace partition to un-quarantine (e.g. "data").
  // Must be non-empty; to clear all partitions issue one request per partition.
  string partition = 1;
}

message RotateDekRequest {
  // If true, the current DEK is revoked (not retired) and the rotation
  // is recorded as an emergency event in the audit log.
  bool emergency = 1;
}

message ConfirmRotateDekRequest {
  // The rotation_id of the pending emergency rotation that requires confirmation.
  string rotation_id = 1;
}

message RotateDekLocalEmergencyRequest {
  // The operator's reason for invoking the bypass, recorded with the
  // candidate for audit. Required.
  string justification = 1;
}

message RotateDekLocalEmergencyResponse {
  // The candidate's rotation_id, for later reconciliation once quorum
  // returns.
  string rotation_id = 1;
}

message DekLocalEmergencyCandidateSummary {
  string rotation_id = 1;
  string initiator = 2;
  string justification = 3;
  // Unix epoch seconds the candidate was created.
  int64 created_at_unix = 4;
  // 0 means staged locally on the node answering this request; nonzero
  // means it arrived via gossip from that node id (ADR 0028 §5).
  uint64 origin_node_id = 5;
  bool conflicted = 6;
  bool revoked = 7;
}

message ListDekLocalEmergencyCandidatesResponse {
  repeated DekLocalEmergencyCandidateSummary candidates = 1;
}

message ReconcileDekLocalEmergencyRequest {
  // The rotation_id of the node-local candidate to promote, from
  // ListDekLocalEmergencyCandidates. The operator's explicit choice when
  // multiple (possibly conflicting) candidates exist (ADR 0028 §6).
  string rotation_id = 1;
}

// Subsystem mirrors openstack_keystone_local_emergency_store::Subsystem.
enum EmergencySubsystem {
  EMERGENCY_SUBSYSTEM_OAUTH2_SIGNING_KEY = 0;
  EMERGENCY_SUBSYSTEM_DEK = 1;
}

message GossipLocalEmergencyCandidateRequest {
  // The originating node's own Raft node_id.
  uint64 origin_node_id = 1;
  EmergencySubsystem subsystem = 2;
  string scope_id = 3;
  string rotation_id = 4;
  bytes payload = 5;
  string initiator = 6;
  string justification = 7;
  // Unix epoch seconds the candidate was created on the originating node.
  int64 created_at_unix = 8;
}

message GossipLocalEmergencyCandidateResponse {
  // True if this candidate conflicted with a different active candidate
  // already held by the receiving node for the same subsystem/scope.
  bool conflict = 1;
}

// BackupRequest initiates a server-side operator snapshot export.
message BackupRequest {}

// BackupChunk is one chunk of the streaming encrypted snapshot response.
// The final chunk carries snapshot_utc_epoch and dek_version so the client
// can verify the backup envelope without decrypting it.
message BackupChunk {
  bytes data = 1;
  // Only set in the final chunk.
  optional uint64 snapshot_utc_epoch = 2;
  // Only set in the final chunk.
  optional uint32 dek_version = 3;
}

// RestoreChunk is one chunk of the client-to-server encrypted snapshot upload.
message RestoreChunk {
  bytes data = 1;
}
