[workspace]
members = [
  "crates/api-key-driver-raft",
  "crates/api-types",
  "crates/audit",
  "crates/appcred-driver-sql",
  "crates/assignment-driver-sql",
  "crates/catalog-driver-sql",
  "crates/config",
  "crates/core",
  "crates/core-types",
  "crates/credential-driver-sql",
  "crates/auth-plugin-identity-driver-raft",
  "crates/auth-plugin-runtime",
  "crates/federation-driver-sql",
  "crates/identity-driver-sql",
  "crates/idmapping-driver-sql",
  "crates/k8s-auth-driver-raft",
  "crates/k8s-auth-driver-sql",
  "crates/key-repository",
  "crates/keystone",
  "crates/mapping-driver-raft",
  "crates/oauth2-client-driver-raft",
  "crates/oauth2-key-driver-raft",
  "crates/oauth2-session-driver-raft",
  "crates/resource-driver-sql",
  "crates/role-driver-sql",
  "crates/revoke-driver-sql",
  "crates/scim-driver-raft",
  "crates/storage",
  "crates/storage-api",
  "crates/storage-crypto",
  "crates/storage-crypto-pkcs11",
  "crates/storage-crypto-tpm",
  "crates/token-driver-fernet",
  "crates/token-driver-jws",
  "crates/token-restriction-driver-sql",
  "crates/trust-driver-sql",
  "crates/webauthn",
  "crates/cli-manage",
  "tests/api",
  "tests/integration",
  "tests/federation",
]
default-members = [
  "crates/*",
]
exclude = [
  "tests/loadtest"
]
resolver = "3"

[workspace.package]
edition = "2024"
license = "Apache-2.0"
authors = ["Artem Goncharov (gtema)"]
rust-version = "1.91"  # MSRV
repository = "https://github.com/openstack-experimental/keystone"
homepage = "https://openstack-experimental.github.io/keystone"
# Exclude content not relevant for the package
exclude = [
  ".github",
  "doc",
  "tests",
  "tools"
]

[workspace.dependencies]
aes-gcm = { version = "0.11" }
arc-swap = { version = "1.7" }
argon2 = { version = "0.5" }
askama = { version = "0.16" }
async-trait = { version = "0.1" }
axum = { version = "0.8", default-features = false }
axum-extra = { version = "0.12", default-features = false }
axum-server = { version = "0.8", default-features = false }
crc32fast = { version = "1.4" }
base64 = { version = "0.22" }
base64urlsafedata = "0.5"
bcrypt = { version = "0.19" }
byteorder = { version = "1.5" }
bytes = { version = "1.12" }
chrono = { version = "0.4", default-features = false }
clap = { version = "4.6" }
color-eyre = { version = "0.6" }
config = { version = "0.15" }
criterion = { version = "0.8" }
dashmap = "6.2"
data-encoding = "2"
derive_builder = { version = "0.20" }
dyn-clone = { version = "1.0" }
extism = { version = "1.30" }
eyre = { version = "0.6" }
fernet = { version = "0.2", default-features = false }
futures = { version = "0.3" }
futures-util = { version = "0.3" }
governor = "0.10"
http-body-util = "0.1"
http = { version = "1.4" }
hyper = { version = "1.10" }
hyper-util = { version = "0.1" }
hkdf = { version = "0.13" }
hmac = { version = "0.13" }
inventory = { version = "0.3" }
ipnet = { version = "2" }
itertools = { version = "0.15" }
mockall = { version = "0.15" }
mockall_double = { version = "0.3" }
