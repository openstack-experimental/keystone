[DEFAULT]
debug = true

[auth]
methods = password,token,openid,application_credential

[database]
connection = postgresql://keystone:password@db/keystone

[api_policy]
opa_base_url = http://opa:8181

# Global per-IP rate limiting (ADR-0022).
# When enabled, each unique client IPv4 address (/32) or IPv6 /64 prefix
# is allowed at most `burst_size` requests in a burst, replenishing at
# `replenish_rate_per_second` cells/s thereafter.
# The application refuses to start if `enabled = true` with either value
# set to 0. Disabled by default.
#
# [rate_limit_global_ip]
# enabled = false
# burst_size = 100
# replenish_rate_per_second = 10

# Reverse proxies trusted to supply X-Forwarded-For for the global-IP
# limiter. Leave empty for direct deployments; the TCP peer is then used.
#
# [rate_limit_trusted_proxies]
# trusted_proxies = 10.0.0.0/8,192.168.0.0/16

# Per-user authentication rate limiting (ADR-0022).
# When enabled, each existing user account is allowed at most `burst_size`
# authentication attempts (password or TOTP) in a burst, replenishing at
# `replenish_rate_per_second` cells/s thereafter. The limiter is keyed on
# the canonical user ID and consulted only after the user is confirmed to
# exist, before any password hashing.
# The application refuses to start if `enabled = true` with either value
# set to 0. Disabled by default.
#
# [rate_limit_user_auth]
# enabled = false
# burst_size = 5
# replenish_rate_per_second = 1
