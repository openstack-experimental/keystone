[DEFAULT]
debug = true
use_stderr = true
log_dir = /var/log/keystone

[auth]
methods = password,token,openid,application_credential,x509,mapped,ec2credential

[api_policy]
opa_base_url = unix:///var/opa/opa.sock

[webauthn]
enabled = true
driver = raft
relying_party_id = local
relying_party_origin = https://keystone.local
relying_party_name = keystone

#[interface_public]
#cluster_address = 0.0.0.0:8300

[interface_internal]
tcp_address = 0.0.0.0:8215
type = "spiffe"
trust_domains = "example.org"

# Admin interface can only be a unix socket (same-pod clients only). Used
# by the `keystone` container's own postStart hook to run
# `keystone-manage oauth2 ensure-signing-key --domain default` once the
# server is up -- the legacy Python `keystone-manage bootstrap` run by
# bootstrap-job.yaml writes the `default` domain straight to the DB and
# never fires the Rust API's `Oauth2KeyHook`, so `default` would otherwise
# never get an OAuth2 signing key.
[interface_admin]
socket_path = /run/keystone/admin.sock
trust_domains = example.org
admin_svid = spiffe://example.org/ns/default/sa/keystone

[mapping]
cluster_salt = "fbb27433d07ab307cc1fc899d0e174cf197fd398fbcff7285a63fe2f94eec2fe"
