apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: dex
  name: dex
spec:
  replicas: 1
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 300
  selector:
    matchLabels:
      app.kubernetes.io/name: dex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dex
    spec:
      containers:
        - image: dex
          name: dex
          ports:
            - containerPort: 5556
              protocol: TCP
          volumeMounts:
            - mountPath: /etc/dex/config.docker.yaml
              name: dex
              subPath: config.yaml
      volumes: 
        - name: dex
          configMap:
            name: dex
