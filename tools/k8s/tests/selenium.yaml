# selenium-standalone.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium
spec:
  replicas: 1
  selector:
    matchLabels:
      app: selenium
  template:
    metadata:
      labels:
        app: selenium
    spec:
      containers:
      - name: selenium
        image: quay.io/opendevmirror/selenium-standalone-firefox
        ports:
        - containerPort: 4444
        resources:
          limits:
            memory: "2Gi"
            cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: selenium-service
spec:
  selector:
    app: selenium
  ports:
    - protocol: TCP
      port: 4444
      targetPort: 4444
