name: CI

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/ci*.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'benches/**'
      - 'crates/**'
      - 'tools/setup-db.sh'
      - 'tools/docker-compose.test.yaml'
  merge_gate:

env:
  CARGO_TERM_COLOR: always
  NEXTEST_RETRIES: 3
  KEYSTONE_DEV_KEK: 4242424242424242424242424242424242424242424242424242424242424242
  KEYSTONE_ALLOW_ENV_KEK: "1"
  SPIRE_VERSION: "1.15.1"

jobs:
  test:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install protobuf-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@6d653acede28d24f02e3cd41383119e8b1b35921 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@de6bbd1333b8f331563d54a051e542c7dfef81c3 # v2.68.34
        with:
          tool: cargo-nextest

      - name: Install SPIRE server
        run: |
          wget https://github.com/spiffe/spire/releases/download/v${SPIRE_VERSION}/spire-${SPIRE_VERSION}-linux-amd64-musl.tar.gz
          tar -xvf spire-${SPIRE_VERSION}-linux-amd64-musl.tar.gz
          # Move binaries to a standard directory and add to PATH
          sudo cp spire-${SPIRE_VERSION}/bin/spire-server /usr/local/bin/
          sudo cp spire-${SPIRE_VERSION}/bin/spire-agent /usr/local/bin/

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@34a30e8a924d1b03ce2cf7abe97250bbb1f332b5 # v2.2.0
        with:
          version: latest

      - name: Rust Cache
        uses: swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0

      - name: Run tests (unit)
        run: cargo nextest run --all-features

      - name: Run tests (sqlite)
        run: cargo nextest run -p test_integration

      - name: Run tests (mysql)
        run: cargo nextest run -p test_integration --profile mysql --no-capture

      - name: Run tests for postgres
        run: cargo nextest run -p test_integration --profile postgres --no-capture

      - name: Run tests for raft drivers
        run: cargo nextest run -p test_integration --profile raft --no-capture

      - name: Run Rest API v3 tests
        run: cargo nextest run -p test_api --profile api --no-capture --test integration_api_v3

      - name: Run Doc tests
        run: cargo test --doc

      - name: Dump docker state
        if: failure()
        run: docker ps -a

  openapi:
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@6d653acede28d24f02e3cd41383119e8b1b35921 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install protobuf-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Rust Cache
        uses: swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0

      - name: Generate OpenAPI
        run: cargo run --bin keystone -- --dump-openapi yaml > openapi.yaml

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: openapi.spec
          path: openapi.yaml
