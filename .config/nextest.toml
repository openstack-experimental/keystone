experimental = ["setup-scripts"]

[profile.default]
# exclude raft-only tests from the integration test binary only
default-filter = 'not (binary(integration) and (test(/spiffe/) or test(/mapping/) or test(/test_cluster/) or test(/api_key/) or test(/scim_realm/) or test(/oauth2_session/) or test(/oauth2_token_verify/) or test(/oauth2_device_grant/) or test(/oauth2_token_exchange/) or test(/oauth2_key_janitor/) or test(/oauth2_emergency_rotation/)))'
# Global default settings
#
[scripts.setup.setup-pg]
command = { command-line = [ "tools/setup-db.sh", "postgres" ] }

[scripts.setup.setup-mysql]
command = { command-line = [ "tools/setup-db.sh", "mysql" ] }

[scripts.setup.teardown]
command = { command-line = [ "tools/teardown-db.sh" ] }

[scripts.setup.raft-env]
command = { command-line = [ "tools/raft-env.sh" ] }

[scripts.setup.start-api]
command = { command-line = [ "tools/start-api.sh" ] }

[scripts.setup.start-ldap-test]
command = { command-line = [ "tools/start-ldap-test.sh" ] }


[profile.ci]
inherits = "default"

[profile.ci.junit]
path = "junit.xml"
store-success-output = false
store-failure-output = true

# --- POSTGRES PROFILE ---
[profile.postgres]

[[profile.postgres.scripts]]
filter = "binary(api)"
setup = "setup-pg"
[[profile.postgres.scripts]]
filter = "binary(integration)"
setup = "setup-pg"
[[profile.postgres.scripts]]
filter = "binary(provider)"
setup = "setup-pg"

[profile.ci-postgres]
inherits = "postgres"
[profile.ci-postgres.junit]
path = "junit.xml"
store-success-output = false
store-failure-output = true

# --- MYSQL PROFILE ---
[profile.mysql]

[[profile.mysql.scripts]]
filter = "binary(api)"
setup = "setup-mysql"
[[profile.mysql.scripts]]
filter = "binary(integration)"
setup = "setup-mysql"
[[profile.mysql.scripts]]
filter = "binary(provider)"
setup = "setup-mysql"

[profile.ci-mysql]
inherits = "mysql"
[profile.ci-mysql.junit]
path = "junit.xml"
store-success-output = false
store-failure-output = true

# --- Raft based integration test ---
[profile.raft]
default-filter = "all()"

[[profile.raft.scripts]]
filter = "binary(integration) + binary(test_cluster)"
setup = "raft-env"

[profile.ci-raft]
inherits = "raft"
[profile.ci-raft.junit]
path = "junit.xml"
store-success-output = false
store-failure-output = true

# --- API tests ---
[profile.api]
#default-filter = "binary(integration_api_v3) + binary(integration_api_v4)"

[[profile.api.scripts]]
filter = "binary(integration_api_v3) + binary(integration_api_v4) + binary(scim_v2)"
setup = "start-api"

[profile.ci-api]
inherits = "api"
[[profile.ci-api.scripts]]
filter = "binary(integration_api_v3) + binary(integration_api_v4) + binary(scim_v2)"
setup = "start-api"
[profile.ci-api.junit]
path = "junit.xml"
store-success-output = false
store-failure-output = true

# --- LDAP driver functional tests ---
# Spins up a throwaway local `slapd` (no Docker daemon required; see
# tools/start-ldap-test.sh), seeds it from
# crates/identity-driver-ldap/tests/fixtures/base.ldif, and runs the
# `live_tests` module's functional tests against it. Those tests skip
# themselves (rather than fail) under any other profile, since
# KEYSTONE_LDAP_TEST_URL is only set here.
[profile.ldap]

[[profile.ldap.scripts]]
filter = "package(openstack-keystone-identity-driver-ldap)"
setup = "start-ldap-test"

[profile.ci-ldap]
inherits = "ldap"
[[profile.ci-ldap.scripts]]
filter = "package(openstack-keystone-identity-driver-ldap)"
setup = "start-ldap-test"
[profile.ci-ldap.junit]
path = "junit.xml"
store-success-output = false
store-failure-output = true
