[package]
name = "test_api"
rust-version.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[package.metadata.dist]
dist = false

[dependencies]
base64.workspace = true
bytes.workspace = true
eyre.workspace = true
derive_builder.workspace = true
http.workspace = true
openstack-keystone-api-types = { version = "0.1", features = ["builder"], path = "../../crates/api-types" }
openstack_sdk_core = { version = "0.22" }
reqwest = { workspace = true, features = ["json", "http2", "multipart", "gzip", "deflate"] }
secrecy = { workspace = true, features = ["serde"] }
serde.workspace = true
serde_json.workspace = true
serde_urlencoded.workspace = true
tracing.workspace = true
tokio = { workspace = true, features = ["fs"] }
tracing-test = { workspace = true, features = ["no-env-filter"] }
webauthn-authenticator-rs = { workspace = true, features = ["softtoken"] }
url = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
async-trait.workspace = true

[[test]]
name = "integration_api"
path = "src/api.rs"
test = false

[[test]]
name = "k8s_auth"
path = "src/k8s_auth.rs"
test = false
