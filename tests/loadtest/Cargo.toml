[package]
name = "load_test"
rust-version = "1.91"  # MSRV
edition = "2024"

[package.metadata.dist]
dist = false

[dependencies]
goose = { version = "^0.18" }
tokio = { version = "1.49" }
openstack_sdk = { version = "^0.22", default-features = false, features = ["async", "identity"] }
reqwest = { version = "0.12", features = ["json"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
fastrand = "2"

[[bin]]
name="load_test"
path="src/main.rs"
